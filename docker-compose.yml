name: monolith-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: monolith
      POSTGRES_PASSWORD: monolith
      POSTGRES_DB: monolith
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U monolith -d monolith']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://monolith:monolith@postgres:5432/monolith?schema=public
      DIRECT_URL: postgresql://monolith:monolith@postgres:5432/monolith?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '3001:3001'
    volumes:
      - .:/app
      - monolith_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "pnpm install && pnpm db:generate && pnpm --filter @monolith/types build && pnpm --filter @monolith/config build && pnpm --filter @monolith/api dev"

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_INTERNAL_URL: http://api:3001
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - monolith_node_modules:/app/node_modules
      - web_next_cache:/app/apps/web/.next
    depends_on:
      - api
    command: sh -c "pnpm install && pnpm --filter @monolith/web dev"

volumes:
  postgres_data:
  redis_data:
  monolith_node_modules:
  web_next_cache:
